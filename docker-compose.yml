services:
  db:
    image: postgres:16.3-alpine
    container_name: smile_db_30225
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-Asia/Dhaka}
    ports:
      - "${POSTGRES_PORT_HOST:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [ysdtp]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: smile-classifier-30225:1.0
    container_name: smile_app_30225
    restart: unless-stopped
    environment:
      STUDENT_ID: ${STUDENT_ID:-30225}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-Asia/Dhaka}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Inside the network the database is reachable by service name on its
      # own port. These override whatever .env holds for local development.
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BASE_DIR: /app
      DATA_DIR: /app/data
      MODEL_DIR: /app/models
      SEED_DIR: /app/seed
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - modelstore:/app/models
      - datastore:/app/data
    depends_on:
      db:
        condition: service_healthy
    networks: [ysdtp]

  pgadmin:
    image: dpage/pgadmin4:8.12
    container_name: smile_pgadmin_30225
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks: [ysdtp]

volumes:
  pgdata:
  modelstore:
  datastore:
  pgadmin_data:

networks:
  ysdtp:
    name: YSDTP_B5_AI_30225
    external: true